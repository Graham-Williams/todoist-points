# todoist-points — production compose for the home server.
#
# The service name `todoist-points` is load-bearing: it is the DNS alias the
# Cloudflare Tunnel ingress targets (http://todoist-points:3000) over the
# shared `km-tracker_default` bridge network, where the cloudflared connector
# (from the km-tracker compose project) also lives.
services:
  todoist-points:
    build: .
    restart: unless-stopped
    # NO `ports:` — deliberate (same convention as km-tracker). The app is
    # reachable ONLY via the Cloudflare Tunnel + Access. Publishing a host
    # port would expose the app (which has no auth of its own) directly on
    # the LAN, bypassing Cloudflare Access entirely.
    environment:
      DB_PATH: /data/todoist-points.db
      # Read from a box-local, gitignored .env next to this file.
      TODOIST_API_TOKEN: ${TODOIST_API_TOKEN:?TODOIST_API_TOKEN must be set}
      # App-level shared-password sign-in gate (src/middleware.ts). Set both to
      # turn the gate ON (the post-Cloudflare-Access model): APP_PASSWORD is the
      # shared secret typed at /login, SESSION_SECRET signs the session cookie.
      # Leave BOTH empty to keep the gate OFF (e.g. while still behind CF Access).
      APP_PASSWORD: ${APP_PASSWORD:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      # In-app Cloudflare Access JWT verification (LEGACY defense-in-depth). The
      # AUD comes from the box-local .env; the team domain is fixed. When
      # APP_PASSWORD is set the middleware skips this block (password gate wins),
      # so at cutover just set APP_PASSWORD/SESSION_SECRET and clear CF_ACCESS_AUD.
      # Optional (:-) so cutover doesn't require the CF var to be present.
      CF_ACCESS_TEAM_DOMAIN: blue-dream-0427.cloudflareaccess.com
      CF_ACCESS_AUD: ${CF_ACCESS_AUD:-}
      # CSRF/origin pin: non-GET requests must carry a matching Origin/Host.
      APP_HOST: todoist-points.graham-williams.com
    volumes:
      - ./data:/data

networks:
  # Join the existing bridge network created by the km-tracker compose
  # project, so the cloudflared connector can reach this service by name.
  default:
    name: km-tracker_default
    external: true
